<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜猜我是誰 - 懷舊戳戳樂</title>
    
    <!-- 引入 Tailwind CSS (快速樣式庫) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 相關庫 (核心框架) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (讓瀏覽器看懂 React 代碼) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts (字體) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">

    <style>
        /* --- 全局樣式設定 --- */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", "Noto Serif TC", sans-serif;
            background-color: #f3e5ab; /* 米黃色懷舊底 */
            background-image: radial-gradient(#e5d59b 15%, transparent 16%), radial-gradient(#e5d59b 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            /* 為底部固定播放器留出空間，避免內容被遮擋 */
            padding-bottom: 3rem; 
        }

        /* --- 戳戳樂紅紙紋理 --- */
        .poke-paper {
            background-color: #ef4444;
            /* SVG 紋理模擬紙張質感 */
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b91c1c' fill-opacity='0.1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .poke-paper:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* --- 戳破動畫 --- */
        @keyframes tearEffect {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 0.8; }
            100% { transform: scale(1.5) rotate(-10deg); opacity: 0; visibility: hidden; }
        }

        .is-poked {
            animation: tearEffect 0.4s forwards ease-out;
            pointer-events: none; /* 戳破後不可再點擊 */
        }

        /* --- 復古文字陰影 --- */
        .retro-shadow {
            text-shadow: 2px 2px 0px #b91c1c;
        }
        
        .retro-box-shadow {
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        /* --- 圖片載入漸顯動畫 --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .img-fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* --- YouTube 播放器樣式調整 --- */
        #youtube-player-container iframe {
            width: 100%;
            height: 100%;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 圖標組件 (使用 SVG) ---
        const IconBase = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const RefreshCw = (props) => <IconBase {...props}><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></IconBase>;
        const VolumeX = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M8 21h8M12 17v4M7 4h10c.8 0 1.4.6 1.4 1.4V7h2.8c.8 0 1.4.6 1.4 1.4v2.8c0 .8-.6 1.4-1.4 1.4H18.4c-.6 3.4-3.6 6-7 6s-6.4-2.6-7-6H2.8C2 12.2 1.4 11.6 1.4 10.8V8c0-.8.6-1.4 1.4-1.4H5.6V5.4C5.6 4.6 6.2 4 7 4z"/></IconBase>;
        const ChevronUp = (props) => <IconBase {...props}><polyline points="18 15 12 9 6 15"/></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"/></IconBase>;

        // --- 戳戳格單元組件 ---
        const PokeHole = ({ index, photo, isPoked, onPoke, isRevealed }) => {
            return (
                <div className="flex flex-col items-center">
                    <div className="relative w-full aspect-square bg-gray-900 rounded-lg shadow-inner overflow-hidden border-4 border-yellow-700/50 retro-box-shadow">
                        {/* 裡面的圖片 (預設隱藏，戳破後顯示) */}
                        <img 
                            src={photo.url} 
                            alt={photo.label}
                            className={`w-full h-full object-cover transition-opacity duration-500 ${isPoked || isRevealed ? 'opacity-100' : 'opacity-0'}`}
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.src = "https://via.placeholder.com/300?text=圖片無法顯示";
                            }}
                        />
                        
                        {/* 圖片標籤 (戳破後顯示) */}
                        {(isPoked || isRevealed) && (
                            <div className="absolute bottom-0 left-0 right-0 bg-black/70 text-white text-center text-sm py-1 font-bold z-10">
                                {photo.label}
                            </div>
                        )}

                        {/* 戳戳樂封面紙 (未揭曉時顯示) */}
                        {!isRevealed && (
                            <div 
                                onClick={onPoke}
                                className={`absolute inset-0 poke-paper flex items-center justify-center border-4 border-dashed border-red-300 ${isPoked ? 'is-poked' : ''}`}
                            >
                                <div className="bg-red-800 text-yellow-300 rounded-full w-16 h-16 flex items-center justify-center border-2 border-yellow-300 shadow-lg transform -rotate-12 group-hover:rotate-0 transition">
                                    <span className="text-3xl font-black">戳</span>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="mt-2 font-bold text-gray-700 bg-white/50 px-3 py-1 rounded-full text-sm border border-gray-400">
                        線索 {index + 1}
                    </div>
                </div>
            );
        };

        const App = () => {
            // --- 遊戲資料 ---
            const gameData = [
                {
                    id: 1,
                    name: "楊麗花",
                    photos: [
                        { url: "https://imgs.gvm.com.tw/upload/gallery/20230531/142223.jpg", label: "年輕時期 (1)" },
                        { url: "https://cdn2.ettoday.net/images/4667/d4667587.jpg", label: "年輕時期 (2)" },
                        { url: "https://www.ttv.com.tw/drama17/yangli-hua/images/appraiser1.jpg", label: "現在照片" }
                    ]
                },
                {
                    id: 2,
                    name: "金城武",
                    photos: [
                        { url: "https://megapx-assets.dcard.tw/images/2e1a59a8-5f95-447e-8e6d-c0d30c5f7d8e/640.jpeg", label: "年輕時期" },
                        { url: "https://www.juksy.com/api/image/webp?source=https://assets.juksy.com/files/articles/129473/672edcde9b8df.jpg", label: "劇照線索" },
                        { url: "https://cdn-cw1.cw.com.tw/images/article/C1418099648229.jpg", label: "近期照片" }
                    ]
                },
                {
                    id: 3,
                    name: "張晨光",
                    photos: [
                        { url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdfy7AdtcrAA7VYMNyTeLJFQT4V3vabEiKmw&s", label: "年輕時期" },
                        { url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRmPNNy-lQxApfdcCRkk6rl9AmFOpDVmI5Xg&s", label: "戲劇劇照" },
                        { url: "https://v3-statics.mirrormedia.mg/images/20210329172012-0810db9e002a85e394b35e857741c471-w1600.webP", label: "現在照片" }
                    ]
                },
                {
                    id: 4,
                    name: "陳美鳳",
                    photos: [
                        { url: "https://static.ctwant.com/images/content/15/55515/ab92bd2af7d9b1426d06a79f685dc226.jpg", label: "年輕寫真" },
                        { url: "https://images.chinatimes.com/newsphoto/2024-09-25/656/20240925005111.jpg", label: "秀場時期" },
                        { url: "https://images.chinatimes.com/newsphoto/2023-08-24/1024/20230824002059.jpg", label: "現在照片" }
                    ]
                },
                {
                    id: 5,
                    name: "張惠妹",
                    photos: [
                        { url: "https://resize-image.vocus.cc/resize?compression=6&norotation=true&url=https%3A%2F%2Fimages.vocus.cc%2Fec998dd5-ad49-4ee8-899f-ffc5e67ab43b.png&width=740&sign=uu-Vso-piL8EjQ5QjovHi6OkkfjZV6cgzwCs3HOKxIk", label: "五燈獎時期" },
                        { url: "https://www.5music.com.tw/cdpic/zn2/5120251318948.jpg", label: "早期宣傳" },
                        { url: "https://iam.marieclaire.com.tw/s1200c675h100b0webp100/assets/mc/202511/690B0F4697A281762332486.jpeg", label: "現在照片" }
                    ]
                },
                {
                    id: 6,
                    name: "葉全真",
                    photos: [
                        { url: "https://pimg.1px.tw/candy0730c/1678967893-4136466741-g.jpg", label: "年輕照片" }, /* 在這裡加上了缺失的雙引號 */
                        { url: "https://www.popdaily.com.tw/shaper/wp-content/uploads/2023/12/9tjakf2sqakg8owsggc408k08s6d9d6.jpeg?resize-w=1700&resize-h=968&format=webp", label: "電影時期" },
                        { url: "https://media.nownews.com/nn_media/thumbnail/2025/09/1758695358375-a8cf895c314d44a99233f7057d7ea7a5-800x451.webp?unShow=false", label: "現在照片" }
                    ]
                },
                {
                    id: 7,
                    name: "譚艾珍",
                    photos: [
                        { url: "https://static.ctwant.com/images/content/43/56643/e515c751d9790b3b7f8070971c97e9f6.jpg", label: "年輕模特" },
                        { url: "https://img.ltn.com.tw/Upload/ent/page/800/2015/05/11/phpKLAEbA.jpg", label: "戲劇時期" },
                        { url: "https://static.tvbs.com.tw/health2.0/images/uploads/2024/12/20241217160929-tsEPrNk0.jpg", label: "現在照片" }
                    ]
                },
                {
                    id: 8,
                    name: "顧寶明",
                    photos: [
                        { url: "https://v3-statics.mirrormedia.mg/images/20220319204838-13c8e2866f096f87eb673dc1c8717260-w1600.png", label: "年輕時期" },
                        { url: "https://pgw.udn.com.tw/gw/photo.php?u=https://uc.udn.com.tw/photo/2023/03/15/0/20639238.png&x=0&y=0&sw=0&sh=0&exp=3600", label: "經典劇照" },
                        { url: "https://v3-statics.mirrormedia.mg/images/20230313175709-54f48cc7527b03277e4ca036d3265f8a-w1600.jpg", label: "現在照片" }
                    ]
                },
                {
                    id: 9,
                    name: "賀一航",
                    photos: [
                        { url: "https://img.ltn.com.tw/Upload/ent/page/800/2015/07/30/82.jpg", label: "秀場搭檔" },
                        { url: "https://uc.udn.com.tw/photo/2024/08/09/105/30266127.jpg", label: "綜藝時期" },
                        { url: "https://img.ltn.com.tw/Upload/news/600/2019/06/04/157.jpg", label: "近期照片" }
                    ]
                }
            ];

            // --- 狀態管理 ---
            const [currentRound, setCurrentRound] = useState(0);
            const [gameState, setGameState] = useState('welcome'); // welcome (歡迎), playing (遊戲中), finished (結束)
            const [pokedHoles, setPokedHoles] = useState([false, false, false]); // 紀錄哪一格被戳了
            const [isRevealed, setIsRevealed] = useState(false); // 是否已公佈答案
            const [isMusicPlaying, setIsMusicPlaying] = useState(false); // 音樂是否播放中
            const [isPlayerExpanded, setIsPlayerExpanded] = useState(false); // 控制底部播放器展開/收合

            const playerRef = useRef(null);
            
            // 當前題目
            const currentItem = gameData[currentRound];

            // --- 初始化 YouTube IFrame API ---
            useEffect(() => {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('youtube-player', {
                        height: '100%',
                        width: '100%',
                        videoId: 'eW09jkDM9_s', // 放鬆鋼琴音樂 ID
                        playerVars: {
                            'playsinline': 1,
                            'controls': 1, // 顯示控制項
                            'loop': 1,
                            'playlist': 'eW09jkDM9_s' // loop 需要此參數
                        },
                        events: {
                            'onReady': onPlayerReady,
                            'onStateChange': onPlayerStateChange
                        }
                    });
                };

                return () => {};
            }, []);

            const onPlayerReady = (event) => {
                event.target.setVolume(50); // 預設音量
            };

            const onPlayerStateChange = (event) => {
                // 同步播放器狀態與按鈕狀態
                if (event.data === YT.PlayerState.PLAYING) {
                    setIsMusicPlaying(true);
                } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                    setIsMusicPlaying(false);
                }
            };

            const toggleMusic = () => {
                if (!playerRef.current || !playerRef.current.playVideo) return;
                
                if (isMusicPlaying) {
                    playerRef.current.pauseVideo();
                } else {
                    playerRef.current.playVideo();
                }
            };

            // --- 遊戲邏輯動作 ---
            const startGame = () => {
                setGameState('playing');
                // 使用者互動後，嘗試播放音樂
                if (playerRef.current && playerRef.current.playVideo) {
                    playerRef.current.playVideo();
                }
            };

            const handlePoke = (index) => {
                // 如果已經戳過或已公佈答案，則無反應
                if (pokedHoles[index] || isRevealed) return;
                
                const newPoked = [...pokedHoles];
                newPoked[index] = true;
                setPokedHoles(newPoked);
            };

            const revealAnswer = () => {
                setIsRevealed(true);
                // 公佈時自動戳開所有格子，讓玩家看到完整圖片
                setPokedHoles([true, true, true]);
            };

            const nextRound = () => {
                if (currentRound < gameData.length - 1) {
                    setCurrentRound(currentRound + 1);
                    setPokedHoles([false, false, false]);
                    setIsRevealed(false);
                } else {
                    setGameState('finished');
                }
            };

            const restartGame = () => {
                setCurrentRound(0);
                setPokedHoles([false, false, false]);
                setIsRevealed(false);
                setGameState('playing');
            };

            // --- 畫面渲染函數 ---

            // 1. 歡迎畫面
            const renderWelcome = () => (
                <div className="bg-red-800 p-8 rounded-3xl shadow-2xl max-w-lg w-full text-center border-8 border-yellow-500 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-4 bg-yellow-500"></div>
                    <div className="absolute bottom-0 left-0 w-full h-4 bg-yellow-500"></div>
                    
                    <h1 className="text-5xl font-black text-yellow-400 mb-2 retro-shadow tracking-widest mt-4">猜猜我是誰</h1>
                    <div className="inline-block bg-yellow-100 text-red-900 font-bold px-6 py-2 rounded-full text-xl mb-8 transform -rotate-2 border-4 border-red-900">
                        懷舊戳戳樂版
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-red-700 p-4 rounded-xl border-2 border-red-900/30">
                            <div className="text-3xl mb-2">👆</div>
                            <div className="text-yellow-100 font-bold">點擊戳紙</div>
                        </div>
                        <div className="bg-red-700 p-4 rounded-xl border-2 border-red-900/30">
                            <div className="text-3xl mb-2">👀</div>
                            <div className="text-yellow-100 font-bold">觀察線索</div>
                        </div>
                    </div>

                    <button 
                        onClick={startGame}
                        className="w-full bg-yellow-400 hover:bg-yellow-300 text-red-900 text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#b45309] active:shadow-[0_2px_0_#b45309] active:translate-y-1 transition flex items-center justify-center gap-3 border-4 border-yellow-600"
                    >
                        <Play size={32} fill="currentColor" /> 開始遊戲
                    </button>
                    <p className="mt-4 text-yellow-200/60 text-sm font-medium">設計者：卓佳蓉 Alice Cho</p>
                </div>
            );

            // 2. 結束畫面
            const renderFinished = () => (
                <div className="bg-red-800 p-8 rounded-3xl shadow-2xl max-w-lg w-full text-center border-8 border-yellow-500">
                    <Trophy className="w-24 h-24 text-yellow-400 mx-auto mb-6 drop-shadow-lg" />
                    <h2 className="text-4xl font-black text-white mb-4">挑戰完成！</h2>
                    <p className="text-yellow-100 text-xl mb-8">所有的名人都被你猜出來了嗎？</p>
                    <button 
                        onClick={restartGame}
                        className="w-full bg-white text-red-800 hover:bg-gray-100 text-xl font-bold py-3 rounded-xl shadow-lg transition flex items-center justify-center gap-2"
                    >
                        <RefreshCw size={24} /> 再玩一次
                    </button>
                </div>
            );

            // 3. 遊戲主畫面
            const renderGame = () => (
                <div className="w-full max-w-4xl mx-auto flex flex-col items-center mb-8">
                    {/* 頂部資訊列 */}
                    <div className="flex justify-between items-center w-full mb-6 px-4">
                        <div className="bg-red-800 text-yellow-400 px-6 py-2 rounded-full font-bold border-4 border-yellow-600 shadow-lg">
                            第 {currentRound + 1} 關
                        </div>
                        <button 
                            onClick={toggleMusic}
                            className={`p-3 rounded-full text-red-900 shadow-lg border-2 border-yellow-700 transition ${isMusicPlaying ? 'bg-yellow-400 hover:bg-yellow-300' : 'bg-gray-400 hover:bg-gray-300'}`}
                            title={isMusicPlaying ? "暫停音樂" : "播放音樂"}
                        >
                            {isMusicPlaying ? <Volume2 size={24} /> : <VolumeX size={24} />}
                        </button>
                    </div>

                    {/* 戳戳樂盒子 */}
                    <div className="bg-red-700 p-4 md:p-8 rounded-2xl shadow-2xl border-b-8 border-r-8 border-red-900 w-full relative">
                        {/* 裝飾釘子 */}
                        <div className="absolute top-2 left-2 w-3 h-3 rounded-full bg-yellow-500 shadow-sm"></div>
                        <div className="absolute top-2 right-2 w-3 h-3 rounded-full bg-yellow-500 shadow-sm"></div>
                        <div className="absolute bottom-2 left-2 w-3 h-3 rounded-full bg-yellow-500 shadow-sm"></div>
                        <div className="absolute bottom-2 right-2 w-3 h-3 rounded-full bg-yellow-500 shadow-sm"></div>

                        <h2 className="text-center text-white text-xl md:text-2xl font-bold mb-6 drop-shadow-md bg-black/20 py-2 rounded-lg mx-auto max-w-md">
                            請戳破紙張尋找線索 👇
                        </h2>

                        {/* 網格區 */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            {currentItem.photos.map((photo, idx) => (
                                <PokeHole 
                                    key={idx}
                                    index={idx}
                                    photo={photo}
                                    isPoked={pokedHoles[idx]}
                                    onPoke={() => handlePoke(idx)}
                                    isRevealed={isRevealed}
                                />
                            ))}
                        </div>

                        {/* 控制按鈕區 */}
                        <div className="flex flex-col items-center gap-4">
                            {!isRevealed ? (
                                <button 
                                    onClick={revealAnswer}
                                    className="bg-yellow-400 hover:bg-yellow-300 text-red-900 text-2xl font-black py-3 px-10 rounded-full shadow-[0_5px_0_#b45309] active:translate-y-1 active:shadow-none transition transform hover:scale-105"
                                >
                                    <span className="flex items-center gap-2"><Eye size={28}/> 公佈答案</span>
                                </button>
                            ) : (
                                <div className="text-center animate-fade-in-up w-full">
                                    <div className="bg-yellow-100 border-4 border-yellow-500 p-6 rounded-2xl mb-6 transform rotate-1 shadow-xl">
                                        <p className="text-gray-500 font-bold mb-1">本尊是...</p>
                                        <h2 className="text-5xl font-black text-red-600 mb-2">{currentItem.name}</h2>
                                    </div>
                                    <button 
                                        onClick={nextRound}
                                        className="bg-green-600 hover:bg-green-500 text-white text-xl font-bold py-3 px-12 rounded-full shadow-[0_5px_0_#15803d] active:translate-y-1 active:shadow-none transition flex items-center gap-2 mx-auto"
                                    >
                                        {currentRound < gameData.length - 1 ? "下一關" : "查看結果"} <ArrowRight />
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    {gameState === 'welcome' && renderWelcome()}
                    {gameState === 'playing' && renderGame()}
                    {gameState === 'finished' && renderFinished()}

                    {/* --- 底部可收合音樂播放器 --- */}
                    <div 
                        className={`fixed bottom-0 left-0 w-full bg-red-900 text-yellow-400 transition-all duration-300 z-50 border-t-4 border-yellow-600 shadow-[0_-4px_10px_rgba(0,0,0,0.3)] ${isPlayerExpanded ? 'h-72' : 'h-10'}`}
                    >
                        {/* 控制按鈕條 (點擊切換展開/收合) */}
                        <button 
                            onClick={() => setIsPlayerExpanded(!isPlayerExpanded)}
                            className="w-full h-10 flex items-center justify-center bg-red-800 hover:bg-red-700 transition font-bold text-sm gap-2"
                        >
                            {isPlayerExpanded ? (
                                <><span className="mr-1">收合音樂播放器</span><ChevronDown size={18}/></>
                            ) : (
                                <><span className="mr-1">展開背景音樂 (放鬆鋼琴)</span><ChevronUp size={18}/></>
                            )}
                        </button>
                        
                        {/* YouTube 播放器容器 */}
                        <div className={`w-full h-[calc(100%-2.5rem)] flex items-center justify-center p-4 ${isPlayerExpanded ? 'opacity-100 visible delay-100' : 'opacity-0 invisible'} transition-all duration-300`}>
                            <div id="youtube-player-container" className="w-full max-w-lg h-full rounded-xl overflow-hidden shadow-2xl border-4 border-yellow-600/50 bg-black">
                                {/* YouTube IFrame API 將會替換這個 div */}
                                <div id="youtube-player"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
